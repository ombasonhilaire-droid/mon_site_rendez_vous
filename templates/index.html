<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site Rendez-vous</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .loading {
            display: none;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .error-list {
            margin-top: 10px;
            padding-left: 20px;
        }
        
        .error-list li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💇 Mon Site Rendez-vous</h1>
        <p class="subtitle">Prenez votre rendez-vous facilement</p>
        
        <form id="formulaire">
            <div class="form-group">
                <label for="nom">Votre nom *</label>
                <input 
                    type="text" 
                    id="nom" 
                    name="nom" 
                    placeholder="Ex: Jean Dupont"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="whatsapp">Votre téléphone / WhatsApp *</label>
                <input 
                    type="tel" 
                    id="whatsapp" 
                    name="whatsapp" 
                    placeholder="Ex: +33 6 12 34 56 78"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="service">Service demandé *</label>
                <select id="service" name="service" required>
                    <option value="">-- Sélectionnez un service --</option>
                    {% for service in services %}
                        <option value="{{ service }}">{{ service }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit">
                <span class="loading">
                    <span class="spinner"></span>
                    Envoi en cours...
                </span>
                <span class="text">Prendre Rendez-vous</span>
            </button>
        </form>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        const formulaire = document.getElementById('formulaire');
        const messageDiv = document.getElementById('message');
        const loadingSpan = document.querySelector('.loading');
        const textSpan = document.querySelector('.text');
        
        formulaire.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Récupérer les données
            const formData = new FormData(formulaire);
            const data = {
                nom: formData.get('nom'),
                whatsapp: formData.get('whatsapp'),
                service: formData.get('service')
            };
            
            // Afficher le chargement
            loadingSpan.style.display = 'inline';
            textSpan.style.display = 'none';
            messageDiv.style.display = 'none';
            
            try {
                // Envoyer les données
                const response = await fetch('/inscription', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                // Afficher le résultat
                messageDiv.style.display = 'block';
                messageDiv.innerHTML = result.message;
                
                if (result.succes) {
                    messageDiv.classList.remove('error');
                    messageDiv.classList.add('success');
                    formulaire.reset();
                    
                    // Message détaillé
                    if (result.details) {
                        messageDiv.innerHTML += `<br><small>${result.details}</small>`;
                    }
                } else {
                    messageDiv.classList.remove('success');
                    messageDiv.classList.add('error');
                    
                    // Afficher les erreurs
                    if (result.erreurs && result.erreurs.length > 0) {
                        messageDiv.innerHTML += '<ul class="error-list">';
                        result.erreurs.forEach(err => {
                            messageDiv.innerHTML += `<li>${err}</li>`;
                        });
                        messageDiv.innerHTML += '</ul>';
                    }
                }
            } catch (error) {
                messageDiv.style.display = 'block';
                messageDiv.classList.remove('success');
                messageDiv.classList.add('error');
                messageDiv.innerHTML = '❌ Erreur de communication. Veuillez réessayer.';
                console.error('Erreur:', error);
            } finally {
                // Rétablir le bouton
                loadingSpan.style.display = 'none';
                textSpan.style.display = 'inline';
            }
        });
        
        // Charger les services au chargement de la page
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/services');
                const data = await response.json();
                console.log('Services disponibles:', data.services);
            } catch (error) {
                console.error('Erreur lors du chargement des services:', error);
            }
        });
    </script>
</body>
</html>
